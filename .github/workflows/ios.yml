name: iOS CI

on:
  push:
    branches: [main]
    paths:
      - 'ios-app/**'
  pull_request:
    branches: [main]
    paths:
      - 'ios-app/**'

jobs:
  build:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ios-app

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.2.app

      - name: Build
        run: |
          xcodebuild build \
            -scheme IFQ \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO

      - name: Run tests
        run: |
          xcodebuild test \
            -scheme IFQ \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO
